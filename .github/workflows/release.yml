name: Release

# Triggered when a tag matching v*.*.* is pushed.
# Builds a signed release APK and attaches it to a GitHub Release named after the tag.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   KEYSTORE_BASE64    base64-encoded contents of hydra-release.jks
#                      generate locally:  base64 -i ~/keystores/hydra-release.jks | pbcopy
#   KEYSTORE_PASSWORD  the keystore password
#   KEY_ALIAS          the key alias (currently "hydra")
#   KEY_PASSWORD       the key password (same as KEYSTORE_PASSWORD if you accepted the default)

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate tag format
        # The in-app updater requires tags to match ^v\d+\.\d+\.\d+$ exactly.
        # Reject pre-release / build-metadata tags here so we don't publish a
        # release the updater will silently skip.
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag '${GITHUB_REF_NAME}' does not match required format ^v\\d+\\.\\d+\\.\\d+$"
            exit 1
          fi

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Restore keystore from secret
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          mkdir -p $RUNNER_TEMP/keystores
          echo "$KEYSTORE_BASE64" | base64 -d > $RUNNER_TEMP/keystores/hydra-release.jks

      - name: Write keystore.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cat > keystore.properties <<EOF
          storeFile=$RUNNER_TEMP/keystores/hydra-release.jks
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Rename APK
        id: rename
        run: |
          VERSION_NAME="${GITHUB_REF_NAME#v}"
          SRC=app/build/outputs/apk/release/app-release.apk
          DEST=app/build/outputs/apk/release/Hydra-${VERSION_NAME}.apk
          mv "$SRC" "$DEST"
          echo "apk_path=$DEST" >> "$GITHUB_OUTPUT"
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"

      - name: Verify signature
        run: |
          BUILD_TOOLS=$(ls $ANDROID_HOME/build-tools | sort -V | tail -1)
          $ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner verify --verbose ${{ steps.rename.outputs.apk_path }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Hydra ${{ steps.rename.outputs.version_name }}
          files: ${{ steps.rename.outputs.apk_path }}
          generate_release_notes: true
